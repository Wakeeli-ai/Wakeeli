<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Wakeeli AI Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1a2744;
      --navy-dark: #0f1729;
      --navy-light: #243356;
      --green-user: #DCF8C6;
      --chat-bg: #ECE5DD;
      --white: #ffffff;
      --text: #111111;
      --subtext: #888888;
      --send-btn: #1a2744;
      --badge-auto: #16a34a;
      --badge-handoff: #d97706;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif;
      background: #e8ecf4;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 0;
    }

    /* Outer wrapper - phone frame on desktop */
    .phone-frame {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      max-height: 780px;
      display: flex;
      flex-direction: column;
      background: var(--chat-bg);
      box-shadow: 0 4px 32px rgba(0,0,0,0.22);
      border-radius: 16px;
      overflow: hidden;
      position: relative;
    }

    @media (max-width: 480px) {
      .phone-frame {
        max-width: 100%;
        border-radius: 0;
        max-height: 100vh;
      }
      body { background: var(--chat-bg); }
    }

    /* Header */
    .header {
      background: var(--navy);
      color: var(--white);
      padding: 12px 14px 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--navy-light);
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--navy-light);
      border: 2px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      color: var(--white);
      flex-shrink: 0;
      letter-spacing: -1px;
    }

    .header-info {
      flex: 1;
      min-width: 0;
    }

    .header-name {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .header-status {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      margin-top: 1px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .mode-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .mode-badge.auto {
      background: var(--badge-auto);
      color: var(--white);
    }

    .mode-badge.handoff {
      background: var(--badge-handoff);
      color: var(--white);
    }

    .btn-header {
      background: rgba(255,255,255,0.12);
      border: none;
      color: var(--white);
      padding: 5px 10px;
      border-radius: 14px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .btn-header:hover { background: rgba(255,255,255,0.22); }

    /* Mode switch bar */
    .mode-switch {
      background: var(--navy-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 6px 14px;
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      flex-shrink: 0;
    }

    .mode-switch a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.15s;
    }

    .mode-switch a:hover { color: var(--white); }

    /* Messages area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 10px 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }

    /* Date separator */
    .date-label {
      text-align: center;
      font-size: 11px;
      color: #666;
      background: rgba(255,255,255,0.65);
      border-radius: 10px;
      padding: 3px 10px;
      margin: 4px auto;
      width: fit-content;
    }

    /* Message bubbles */
    .bubble-wrap {
      display: flex;
      flex-direction: column;
    }

    .bubble-wrap.user { align-items: flex-end; }
    .bubble-wrap.bot { align-items: flex-start; }

    .bubble {
      max-width: 80%;
      padding: 8px 12px 6px 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
      white-space: pre-wrap;
      position: relative;
    }

    .bubble.user {
      background: var(--green-user);
      border-top-right-radius: 2px;
      color: var(--text);
    }

    .bubble.bot {
      background: var(--white);
      border-top-left-radius: 2px;
      color: var(--text);
      box-shadow: 0 1px 2px rgba(0,0,0,0.10);
    }

    .bubble .ts {
      font-size: 10px;
      color: var(--subtext);
      text-align: right;
      margin-top: 3px;
    }

    .bubble.user .ts { color: #5a8f6a; }

    /* Typing indicator */
    .typing-wrap {
      display: flex;
      align-items: flex-start;
    }

    .typing-bubble {
      background: var(--white);
      border-radius: 8px;
      border-top-left-radius: 2px;
      padding: 12px 16px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.10);
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #bbb;
      animation: bounce 1.3s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #999;
      font-size: 13px;
      text-align: center;
      padding: 30px 20px;
    }

    .empty-state .icon { font-size: 38px; margin-bottom: 4px; }
    .empty-state strong { color: #666; font-size: 14px; }

    /* Input bar */
    .input-bar {
      background: #f0f0f0;
      padding: 8px 10px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      flex-shrink: 0;
      border-top: 1px solid #ddd;
    }

    .input-wrap {
      flex: 1;
      background: var(--white);
      border-radius: 22px;
      padding: 9px 14px;
      display: flex;
      align-items: center;
      box-shadow: 0 1px 2px rgba(0,0,0,0.07);
    }

    #msg-input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 14px;
      resize: none;
      max-height: 90px;
      background: transparent;
      font-family: inherit;
      line-height: 1.4;
      color: var(--text);
    }

    #msg-input::placeholder { color: #aaa; }

    .btn-send {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--navy);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-send:hover { background: var(--navy-light); }
    .btn-send:active { transform: scale(0.93); }
    .btn-send:disabled { background: #ccc; cursor: default; transform: none; }

    .btn-send svg {
      width: 20px;
      height: 20px;
      fill: var(--white);
    }

    /* Footer branding */
    .footer-brand {
      text-align: center;
      padding: 5px 0 8px 0;
      font-size: 10px;
      color: #aaa;
      background: #f0f0f0;
      letter-spacing: 0.3px;
      flex-shrink: 0;
    }

    .footer-brand span { font-weight: 600; color: var(--navy); }
  </style>
</head>
<body>

<div class="phone-frame" id="phone-frame">

  <!-- Header -->
  <div class="header">
    <div class="avatar">W</div>
    <div class="header-info">
      <div class="header-name">Wakeeli AI</div>
      <div class="header-status" id="status-text">connecting...</div>
    </div>
    <div class="header-actions">
      <span class="mode-badge" id="mode-badge">auto</span>
      <button class="btn-header" onclick="resetChat()">Reset</button>
    </div>
  </div>

  <!-- Mode switch bar -->
  <div class="mode-switch" id="mode-switch-bar">
    <span id="mode-desc">Auto Booking mode</span>
    &nbsp;&middot;&nbsp;
    <a href="#" id="switch-link" onclick="switchMode(event)">Switch to Agent Handoff</a>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="empty-state" id="empty-state">
      <div class="icon">🏠</div>
      <strong>Starting conversation...</strong>
    </div>
  </div>

  <!-- Input bar -->
  <div class="input-bar">
    <div class="input-wrap">
      <textarea
        id="msg-input"
        placeholder="Type a message..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
        disabled
      ></textarea>
    </div>
    <button class="btn-send" id="send-btn" onclick="sendMessage()" disabled>
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

  <div class="footer-brand">Powered by <span>Wakeeli AI</span></div>

</div>

<script>
  // Detect mode from URL path (/demo/auto or /demo/handoff)
  const path = window.location.pathname.toLowerCase();
  let currentMode = path.includes('handoff') ? 'handoff' : 'auto';
  let sessionId = null;
  let isLoading = false;

  function initMode() {
    const badge = document.getElementById('mode-badge');
    const desc = document.getElementById('mode-desc');
    const switchLink = document.getElementById('switch-link');

    if (currentMode === 'auto') {
      badge.textContent = 'Auto Booking';
      badge.className = 'mode-badge auto';
      desc.textContent = 'Auto Booking mode';
      switchLink.textContent = 'Switch to Agent Handoff';
    } else {
      badge.textContent = 'Agent Handoff';
      badge.className = 'mode-badge handoff';
      desc.textContent = 'Agent Handoff mode';
      switchLink.textContent = 'Switch to Auto Booking';
    }

    document.title = currentMode === 'auto'
      ? 'Wakeeli Demo - Auto Booking'
      : 'Wakeeli Demo - Agent Handoff';
  }

  function switchMode(e) {
    e.preventDefault();
    const newMode = currentMode === 'auto' ? 'handoff' : 'auto';
    const basePath = window.location.pathname.replace(/\/(auto|handoff)$/, '');
    window.location.href = basePath + '/' + newMode;
  }

  function setStatus(text) {
    document.getElementById('status-text').textContent = text;
  }

  function enableInput() {
    document.getElementById('msg-input').disabled = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('msg-input').focus();
  }

  function disableInput() {
    document.getElementById('msg-input').disabled = true;
    document.getElementById('send-btn').disabled = true;
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 90) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function getTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function hideEmptyState() {
    const el = document.getElementById('empty-state');
    if (el) el.remove();
  }

  function addDateLabel() {
    const messages = document.getElementById('messages');
    const today = new Date().toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
    const label = document.createElement('div');
    label.className = 'date-label';
    label.textContent = 'Today, ' + today;
    messages.appendChild(label);
  }

  function stripMarkdown(text) {
    return text
      .replace(/\*\*(.*?)\*\*/gs, '$1')
      .replace(/\*(.*?)\*/gs, '$1')
      .replace(/__(.*?)__/gs, '$1')
      .replace(/_(.*?)_/gs, '$1')
      .replace(/^#{1,6}\s+/gm, '')
      .replace(/^[-*]\s+/gm, '')
      .trim();
  }

  function appendBubble(role, text) {
    hideEmptyState();
    const messages = document.getElementById('messages');

    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap ' + role;

    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + role;

    // Strip markdown from bot messages, preserve newlines
    const displayText = role === 'bot' ? stripMarkdown(text) : text;
    const textNode = document.createTextNode(displayText);
    bubble.appendChild(textNode);

    const ts = document.createElement('div');
    ts.className = 'ts';
    ts.textContent = getTime();
    bubble.appendChild(ts);

    wrap.appendChild(bubble);
    messages.appendChild(wrap);
    scrollToBottom();
  }

  function showTyping() {
    hideEmptyState();
    const messages = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = 'typing-wrap';
    wrap.id = 'typing-indicator';

    const tb = document.createElement('div');
    tb.className = 'typing-bubble';
    tb.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

    wrap.appendChild(tb);
    messages.appendChild(wrap);
    scrollToBottom();
  }

  function hideTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function scrollToBottom() {
    const messages = document.getElementById('messages');
    messages.scrollTop = messages.scrollHeight;
  }

  async function callApi(message) {
    const res = await fetch('/api/demo/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: message,
        mode: currentMode,
        session_id: sessionId
      })
    });

    if (!res.ok) {
      const txt = await res.text();
      throw new Error('Server error ' + res.status + ': ' + txt);
    }

    return await res.json();
  }

  async function startConversation() {
    setStatus('connecting...');
    showTyping();

    try {
      const data = await callApi('[START]');
      sessionId = data.session_id;
      hideTyping();
      addDateLabel();
      appendBubble('bot', data.response);
      setStatus('online');
      enableInput();
    } catch (err) {
      hideTyping();
      hideEmptyState();
      appendBubble('bot', 'Unable to connect. Please refresh and try again.');
      setStatus('connection error');
    }
  }

  async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    disableInput();

    appendBubble('user', text);
    showTyping();
    setStatus('typing...');

    try {
      const data = await callApi(text);
      sessionId = data.session_id;
      hideTyping();

      // Small stagger for natural feel
      await sleep(120);
      appendBubble('bot', data.response);
      setStatus('online');
    } catch (err) {
      hideTyping();
      appendBubble('bot', 'Something went wrong. Try again.');
      setStatus('error');
    } finally {
      isLoading = false;
      enableInput();
    }
  }

  function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
  }

  function resetChat() {
    sessionId = null;
    isLoading = false;
    disableInput();

    const messages = document.getElementById('messages');
    messages.innerHTML = '<div class="empty-state" id="empty-state"><div class="icon">🏠</div><strong>Starting conversation...</strong></div>';

    startConversation();
  }

  // Init
  initMode();
  startConversation();
</script>

</body>
</html>
