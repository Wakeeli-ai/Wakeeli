version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: wakeeli-db
    environment:
      POSTGRES_USER: wakeeli_user
      POSTGRES_PASSWORD: wakeeli_password
      POSTGRES_DB: wakeeli_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wakeeli_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wakeeli-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wakeeli-backend
    environment:
      DATABASE_URL: postgresql://wakeeli_user:wakeeli_password@db:5432/wakeeli_db
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - wakeeli-network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000/api
    container_name: wakeeli-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - wakeeli-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  wakeeli-network:
    driver: bridge
